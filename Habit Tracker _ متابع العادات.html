<!DOCTYPE html>
<!-- saved from url=(0034)file:///D:/1.%20project/index.html -->
<html lang="ar" dir="rtl"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <title>Habit Tracker  | متابع العادات</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg: #f4f7f6;
            --danger: #e74c3c;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding: 20px; color: var(--primary); }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        header { text-align: center; margin-bottom: 30px; }
        header h1 { margin: 0; color: var(--primary); font-size: 28px; }
        header p { color: #7f8c8d; margin-top: 5px; }

        .input-section { display: flex; gap: 10px; margin-bottom: 25px; justify-content: center; }
        input[type="text"] { padding: 12px; border: 2px solid #ddd; border-radius: 8px; width: 350px; font-size: 16px; outline: none; transition: border-color 0.3s; }
        input[type="text"]:focus { border-color: var(--accent); }
        
        .btn-add { padding: 12px 25px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-clear { padding: 12px 20px; background: #95a5a6; color: white; border: none; border-radius: 8px; cursor: pointer; margin-right: 10px; }

        .stats-container { background: #fff; border: 2px solid #ecf0f1; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        .progress-bar { height: 20px; background: #ecf0f1; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #27ae60, #2ecc71); width: 0%; transition: width 0.5s ease; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th { background: var(--primary); color: white; padding: 15px; font-size: 14px; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        
        .habit-name-cell { text-align: right; font-weight: bold; width: 250px; color: #34495e; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: var(--accent); }
        
        .delete-btn { color: var(--danger); cursor: pointer; border: none; background: none; font-size: 20px; transition: transform 0.2s; }
        .delete-btn:hover { transform: scale(1.2); }

        .empty-state { text-align: center; padding: 40px; color: #bdc3c7; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>نظام متابعة العادات الذكي</h1>
        <p id="currentDate">الاثنين، ٩ مارس ٢٠٢٦</p>
    </header>

    <div class="input-section">
        <input type="text" id="habitInput" placeholder="أضف عادة جديدة ">
        <button class="btn-add" onclick="addHabit()">إضافة للجدول</button>
        <button class="btn-clear" onclick="clearAll()">مسح الكل</button>
    </div>
    
    <div class="stats-container">
        <div class="progress-header">
            <span>مستوى إنجازك الاسبوعي</span>
            <span id="percentText">0%</span>
        </div>
        <div class="progress-bar">
            <div id="fill" class="progress-fill" style="width: 0%;"></div>
        </div>
    </div>

    <table id="habitTable">
        <thead>
            <tr>
                <th>العادة</th>
                <th>السبت</th>
                <th>الأحد</th>
                <th>الاثنين</th>
                <th>الثلاثاء</th>
                <th>الأربعاء</th>
                <th>الخميس</th>
                <th>الجمعة</th>
                <th>حذف عاده</th>
            </tr>
        </thead>
        <tbody id="habit-body"></tbody>
    </table>
    <div id="emptyMsg" class="empty-state" style="display: block;">لا توجد عادات حالياً.. ابدأ بإضافة عاداتك لعام 2026!</div>
</div>

<script>
    let habits = JSON.parse(localStorage.getItem('myHabits')) || [];

    // تحديث التاريخ
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    // تشغيل التطبيق عند التحميل
    renderHabits();

    function addHabit() {
        const input = document.getElementById('habitInput');
        const text = input.value.trim();
        if (!text) return;

        const newHabit = {
            id: Date.now(),
            name: text,
            days: [false, false, false, false, false, false, false] // 7 أيام
        };

        habits.push(newHabit);
        saveAndRender();
        input.value = "";
    }

    function toggleDay(habitId, dayIndex) {
        const habit = habits.find(h => h.id === habitId);
        habit.days[dayIndex] = !habit.days[dayIndex];
        saveAndRender();
    }

    function deleteHabit(habitId) {
        habits = habits.filter(h => h.id !== habitId);
        saveAndRender();
    }

    function clearAll() {
        if(confirm("هل أنت متأكد من مسح جميع العادات؟")) {
            habits = [];
            saveAndRender();
        }
    }

    function saveAndRender() {
        localStorage.setItem('myHabits', JSON.stringify(habits));
        renderHabits();
    }

    function renderHabits() {
        const tbody = document.getElementById('habit-body');
        const emptyMsg = document.getElementById('emptyMsg');
        tbody.innerHTML = "";

        if (habits.length === 0) {
            emptyMsg.style.display = 'block';
            updateProgress(0);
            return;
        }

        emptyMsg.style.display = 'none';
        let totalChecks = habits.length * 7;
        let checkedCount = 0;

        habits.forEach(habit => {
            const row = document.createElement('tr');
            let cells = `<td class="habit-name-cell">${habit.name}</td>`;
            
            habit.days.forEach((checked, index) => {
                if(checked) checkedCount++;
                cells += `<td><input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleDay(${habit.id}, ${index})"></td>`;
            });

            cells += `<td><button class="delete-btn" onclick="deleteHabit(${habit.id})">×</button></td>`;
            row.innerHTML = cells;
            tbody.appendChild(row);
        });

        const percent = totalChecks > 0 ? Math.round((checkedCount / totalChecks) * 100) : 0;
        updateProgress(percent);
    }

    function updateProgress(percent) {
        document.getElementById('percentText').innerText = percent + "%";
        document.getElementById('fill').style.width = percent + "%";
    }
</script>


</body></html>
